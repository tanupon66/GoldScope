name: GoldScope Mobile One-Click Deploy (Hotfix 2)

on:
  workflow_dispatch:
    inputs:
      deployment_mode:
        description: "เลือก first_install ครั้งแรก หรือ safe_update สำหรับอัปเดตโดยไม่เปลี่ยน Secrets"
        required: true
        default: first_install
        type: choice
        options:
          - first_install
          - safe_update
      confirmation:
        description: "พิมพ์ INSTALL_DEMO สำหรับครั้งแรก หรือ UPDATE_DEMO สำหรับอัปเดต"
        required: true
        type: string
      worker_name:
        description: "ชื่อ Worker (ตัวพิมพ์เล็ก ตัวเลข และขีดกลาง)"
        required: true
        default: goldscope-autotrade
        type: string
      database_location:
        description: "ตำแหน่งหลักของ D1"
        required: true
        default: apac
        type: choice
        options:
          - apac
          - oc
          - weur
          - eeur
          - wnam
          - enam
      run_e2e:
        description: "รัน E2E ก่อน Deploy (แนะนำเปิด)"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: goldscope-cloudflare-production
  cancel-in-progress: false

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  NEWS_API_BASE_URL: ${{ vars.NEWS_API_BASE_URL }}
  ECONOMIC_CALENDAR_API_BASE_URL: ${{ vars.ECONOMIC_CALENDAR_API_BASE_URL }}
  GOLDSCOPE_WORKER_NAME: ${{ inputs.worker_name }}
  GOLDSCOPE_DATABASE_NAME: goldscope-autotrade
  GOLDSCOPE_D1_LOCATION: ${{ inputs.database_location }}

jobs:
  validate-build-deploy:
    name: Validate, provision and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: ตรวจคำยืนยันและ Cloudflare credentials
        shell: bash
        run: |
          set -euo pipefail
          expected="UPDATE_DEMO"
          if [ "${{ inputs.deployment_mode }}" = "first_install" ]; then expected="INSTALL_DEMO"; fi
          if [ "${{ inputs.confirmation }}" != "$expected" ]; then
            echo "คำยืนยันไม่ถูกต้อง ต้องพิมพ์ $expected"
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ] || [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "ยังไม่ได้ตั้ง CLOUDFLARE_ACCOUNT_ID หรือ CLOUDFLARE_API_TOKEN ใน GitHub Actions Secrets"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: หา Source หรือแตก Mobile Payload ZIP
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "$GITHUB_WORKSPACE/package.json" ]; then
            project_dir="$GITHUB_WORKSPACE"
          else
            payload="$(find "$GITHUB_WORKSPACE" -maxdepth 3 -type f -name 'GoldScope-AutoTrade-v*-Mobile-Payload.zip' | sort -V | tail -n 1)"
            if [ -z "$payload" ]; then
              echo "ไม่พบ package.json หรือ GoldScope-AutoTrade-v*-Mobile-Payload.zip"
              exit 1
            fi
            extract_dir="$RUNNER_TEMP/goldscope-mobile-payload"
            rm -rf "$extract_dir"
            mkdir -p "$extract_dir"
            unzip -q "$payload" -d "$extract_dir"
            package_file="$(find "$extract_dir" -type f -name package.json -not -path '*/node_modules/*' | head -n 1)"
            if [ -z "$package_file" ]; then
              echo "Payload ZIP ไม่มี package.json"
              exit 1
            fi
            project_dir="$(dirname "$package_file")"
          fi
          echo "PROJECT_DIR=$project_dir" >> "$GITHUB_ENV"
          echo "ใช้โปรเจกต์จาก: $project_dir"

      - name: ตรวจ Secrets สำหรับการติดตั้งครั้งแรก
        if: ${{ inputs.deployment_mode == 'first_install' }}
        shell: bash
        env:
          GOLDSCOPE_ADMIN_PASSWORD: ${{ secrets.GOLDSCOPE_ADMIN_PASSWORD }}
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_IDENTIFIER: ${{ secrets.CAPITAL_IDENTIFIER }}
          CAPITAL_API_PASSWORD: ${{ secrets.CAPITAL_API_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in GOLDSCOPE_ADMIN_PASSWORD CAPITAL_API_KEY CAPITAL_IDENTIFIER CAPITAL_API_PASSWORD; do
            if [ -z "${!name:-}" ]; then echo "ขาด GitHub Secret: $name"; missing=1; fi
          done
          if [ "$missing" -ne 0 ]; then exit 1; fi
          if [ "${#GOLDSCOPE_ADMIN_PASSWORD}" -lt 10 ]; then
            echo "GOLDSCOPE_ADMIN_PASSWORD ต้องยาวอย่างน้อย 10 ตัวอักษร"
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          npm ci

      - name: Security, unit tests and production build
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          npm run check

      - name: Desktop and mobile E2E smoke test
        if: ${{ inputs.run_e2e }}
        shell: bash
        env:
          GOLDSCOPE_E2E_ARTIFACT_DIR: ${{ runner.temp }}/goldscope-e2e-artifacts
        run: |
          cd "$PROJECT_DIR"
          npm run test:e2e

      - name: Upload E2E screenshots and tuning fixture
        if: ${{ always() && inputs.run_e2e }}
        uses: actions/upload-artifact@v7
        with:
          name: goldscope-e2e-${{ github.run_number }}
          path: ${{ runner.temp }}/goldscope-e2e-artifacts
          if-no-files-found: warn
          retention-days: 7

      - name: สร้างหรือใช้ D1/Queues เดิมและสร้าง config ชั่วคราว
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          node scripts/mobile-cloudflare-bootstrap.mjs \
            --config=wrangler.jsonc \
            --out=.wrangler.mobile.generated.jsonc \
            --worker-name="${{ inputs.worker_name }}" \
            --database-name=goldscope-autotrade \
            --database-location="${{ inputs.database_location }}" \
            --app-version=3.2.1

      - name: ตรวจ Durable Object bindings และ migrations ก่อน Deploy
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          node <<'NODE'
          const { readFileSync } = require('node:fs');
          const config = JSON.parse(readFileSync('.wrangler.mobile.generated.jsonc', 'utf8'));
          const bindings = new Map((config.durable_objects?.bindings || []).map(item => [item.name, item.class_name]));
          const requiredBindings = new Map([
            ['AUTO_TRADE_STATE', 'AutoTradeState'],
            ['AUTH_STATE', 'AuthState']
          ]);
          for (const [name, className] of requiredBindings) {
            if (bindings.get(name) !== className) {
              throw new Error(`Durable Object binding ไม่ครบ: ${name} -> ${className}`);
            }
          }
          const migrations = config.migrations || [];
          const migratedClasses = new Set(migrations.flatMap(item => item.new_sqlite_classes || []));
          for (const className of requiredBindings.values()) {
            if (!migratedClasses.has(className)) {
              throw new Error(`Durable Object migration ไม่ครบ: ${className}`);
            }
          }
          console.log('Durable Object config พร้อม: AUTO_TRADE_STATE, AUTH_STATE');
          NODE

      - name: เตรียม Cloudflare Secrets แบบไม่แสดงค่า
        if: ${{ inputs.deployment_mode == 'first_install' }}
        env:
          GOLDSCOPE_ADMIN_PASSWORD: ${{ secrets.GOLDSCOPE_ADMIN_PASSWORD }}
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_IDENTIFIER: ${{ secrets.CAPITAL_IDENTIFIER }}
          CAPITAL_API_PASSWORD: ${{ secrets.CAPITAL_API_PASSWORD }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ECONOMIC_CALENDAR_API_KEY: ${{ secrets.ECONOMIC_CALENDAR_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFICATION_WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
          NOTIFICATION_SECRET: ${{ secrets.NOTIFICATION_SECRET }}
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          node scripts/mobile-prepare-secrets.mjs .mobile-secrets.json

      - name: Apply D1 migrations
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          npx wrangler d1 migrations apply goldscope-autotrade \
            --remote \
            --config .wrangler.mobile.generated.jsonc

      - name: Cloudflare deployment dry-run
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          # ไม่ใช้ strict mode เพราะการติดตั้ง v3.2.1 ต้องเพิ่ม AUTH_STATE ให้ Worker เดิม
          # ใน GitHub Actions โหมด non-interactive Wrangler จะใช้ config ใน repository เป็นแหล่งหลัก
          npx wrangler deploy --config .wrangler.mobile.generated.jsonc --dry-run

      - name: Deploy ครั้งแรกพร้อม Secrets
        if: ${{ inputs.deployment_mode == 'first_install' }}
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          npx wrangler deploy \
            --config .wrangler.mobile.generated.jsonc \
            --secrets-file .mobile-secrets.json \
            --keep-vars \
            --message "GoldScope v3.2.1 mobile first install hotfix2"

      - name: Safe update โดยรักษา Secrets เดิม
        if: ${{ inputs.deployment_mode == 'safe_update' }}
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          npx wrangler deploy \
            --config .wrangler.mobile.generated.jsonc \
            --keep-vars \
            --message "GoldScope v3.2.1 mobile safe update hotfix2"

      - name: สรุปผลติดตั้ง
        if: ${{ success() }}
        shell: bash
        run: |
          {
            echo "## GoldScope AutoTrade v3.2.1 Deploy สำเร็จ"
            echo "- Mode: ${{ inputs.deployment_mode }}"
            echo "- Worker: ${{ inputs.worker_name }}"
            echo "- D1: goldscope-autotrade"
            echo "- D1 location: ${{ inputs.database_location }}"
            echo "- Dashboard: https://dash.cloudflare.com/${CLOUDFLARE_ACCOUNT_ID}/workers/services/view/${{ inputs.worker_name }}/production"
            echo ""
            echo "เปิด Deploy log เพื่อดู workers.dev URL จาก Wrangler แล้วตรวจ /api/health ก่อนเปิด Demo Auto"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: ลบไฟล์ชั่วคราวที่มี Secrets
        if: ${{ always() }}
        shell: bash
        run: |
          if [ -n "${PROJECT_DIR:-}" ]; then
            rm -f "$PROJECT_DIR/.mobile-secrets.json" "$PROJECT_DIR/.wrangler.mobile.generated.jsonc"
          fi
